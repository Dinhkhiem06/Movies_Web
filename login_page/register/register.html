<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flix | Sign up</title>
  <link rel="stylesheet" href="/images_movies/movie-logo.png">
  <link rel="stylesheet" href="/login_page/common.css" />
  <link rel="stylesheet" href="/login_page/register/register.css" />
</head>
<body>
  <main class="auth-page">
    <article class="auth-layout">
      <section class="auth-main">
        <header class="auth-header">
          <a class="auth-header__home" href="/index.html" aria-label="Go to the Flix home page">
            <img class="auth-header__logo" src="/login_page/assets/movie_logo.png" width="500" height="500" alt="Flix" />
          </a>
        </header>

        <!-- ============================================================
             This page contains two views: registration and OTP verification.
             ============================================================ -->
        <div class="auth-card">

      <!-- ============ SECTION: REGISTRATION ============ -->
      <section id="view-register" class="auth-view is-active" data-view="register" aria-labelledby="register-heading">
        <h1 id="register-heading" class="auth-title">Sign up</h1>
        <p class="auth-subtitle">Create a new account in just a few seconds</p>

        <p class="notice" id="register-notice" role="alert" aria-atomic="true" hidden></p>

        <form id="register-form" class="auth-form" novalidate>
          <fieldset class="form-fieldset">
            <legend class="visually-hidden">Registration information</legend>

            <div class="form-group">
              <label class="form-label" for="register-phone">Phone number</label>
              <div class="input-shell">
                <input
                  type="tel"
                  id="register-phone"
                  name="phone"
                  class="text-input"
                  placeholder="Enter your phone number"
                  inputmode="numeric"
                  maxlength="10"
                  pattern="[0-9]{10}"
                  autocomplete="tel"
                  required
                  aria-invalid="false"
                  aria-describedby="register-phone-error"
                />
              </div>
              <p class="field-error" id="register-phone-error" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="register-password">Password</label>
              <div class="input-shell input-shell--password">
                <input
                  type="password"
                  id="register-password"
                  name="password"
                  class="text-input text-input--password"
                  placeholder="At least 6 characters"
                  minlength="6"
                  autocomplete="new-password"
                  required
                  aria-invalid="false"
                  aria-describedby="register-password-error"
                />
                <button type="button" class="toggle-visibility" data-target="register-password" aria-label="Show password">Show</button>
              </div>
              <p class="field-error" id="register-password-error" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="register-confirm-password">Confirm password</label>
              <div class="input-shell input-shell--password">
                <input
                  type="password"
                  id="register-confirm-password"
                  name="confirm-password"
                  class="text-input text-input--password"
                  placeholder="Re-enter your password"
                  minlength="6"
                  autocomplete="new-password"
                  required
                  aria-invalid="false"
                  aria-describedby="register-confirm-password-error"
                />
                <button type="button" class="toggle-visibility" data-target="register-confirm-password" aria-label="Show password">Show</button>
              </div>
              <p class="field-error" id="register-confirm-password-error" aria-live="polite"></p>
            </div>
          </fieldset>

          <button class="btn btn-primary" id="register-continue-btn" type="submit">Sign up</button>
        </form>

        <p class="auth-footer">
          Already have an account?
          <a href="/login_page/login/login.html" class="link">Login</a>
        </p>
      </section>

      <!-- ============ SECTION: OTP VERIFICATION ============ -->
      <section id="view-otp" class="auth-view" data-view="otp" aria-labelledby="otp-heading" hidden>
        <button type="button" class="otp-back" id="otp-back">
          <span aria-hidden="true">‹</span> Back
        </button>

        <h1 id="otp-heading" class="auth-title">Verify phone number</h1>
        <p class="otp-phone">An OTP code has been sent to <strong id="otp-phone-display">—</strong></p>

        <p class="notice" id="otp-notice" role="alert" aria-atomic="true" hidden></p>

        <form id="otp-form" class="auth-form" novalidate>
          <fieldset class="form-fieldset">
            <legend class="visually-hidden">Enter the 6-digit OTP code</legend>

            <div class="otp-inputs" id="otp-inputs">
              <label class="visually-hidden" for="otp-0">Digit 1</label>
              <input type="text" class="otp-box" id="otp-0" maxlength="6" inputmode="numeric" autocomplete="one-time-code" data-index="0" required aria-invalid="false" aria-describedby="otp-group-error otp-notice" />

              <label class="visually-hidden" for="otp-1">Digit 2</label>
              <input type="text" class="otp-box" id="otp-1" maxlength="1" inputmode="numeric" data-index="1" required aria-invalid="false" aria-describedby="otp-group-error otp-notice" />

              <label class="visually-hidden" for="otp-2">Digit 3</label>
              <input type="text" class="otp-box" id="otp-2" maxlength="1" inputmode="numeric" data-index="2" required aria-invalid="false" aria-describedby="otp-group-error otp-notice" />

              <label class="visually-hidden" for="otp-3">Digit 4</label>
              <input type="text" class="otp-box" id="otp-3" maxlength="1" inputmode="numeric" data-index="3" required aria-invalid="false" aria-describedby="otp-group-error otp-notice" />

              <label class="visually-hidden" for="otp-4">Digit 5</label>
              <input type="text" class="otp-box" id="otp-4" maxlength="1" inputmode="numeric" data-index="4" required aria-invalid="false" aria-describedby="otp-group-error otp-notice" />

              <label class="visually-hidden" for="otp-5">Digit 6</label>
              <input type="text" class="otp-box" id="otp-5" maxlength="1" inputmode="numeric" data-index="5" required aria-invalid="false" aria-describedby="otp-group-error otp-notice" />
            </div>
            <p class="field-error" id="otp-group-error" aria-live="polite"></p>
          </fieldset>

          <p class="otp-meta">
            <span id="otp-timer-wrap">OTP valid for: <time class="otp-timer" id="otp-timer">02:00</time></span>
            <button class="btn-text" id="otp-resend-btn" type="button" hidden>Resend code</button>
          </p>

          <button class="btn btn-primary" id="otp-confirm-btn" type="submit">Confirm</button>
        </form>

        <p class="otp-demo">Demo OTP: <code>123456</code></p>
      </section>

        </div>
      </section>
    </article>
  </main>

  <script src="/login_page/register/register.js"></script>
</body>
</html>
