<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flix | Đăng nhập</title>
  <link rel="stylesheet" href="/login_page/common.css" />
  <link rel="stylesheet" href="/login_page/login/login.css" />
</head>
<body>
  <main class="auth-page">
    <article class="auth-layout">
      <header class="auth-header">
        <a class="auth-header__home" href="/index.html" aria-label="Về trang chủ Flix">
          <img class="auth-header__logo" src="/login_page/assets/movie_logo.png" width="500" height="500" alt="Flix" />
        </a>
      </header>

      <section class="auth-main">
        <div class="auth-card">

      <section id="view-login" class="auth-view is-active" data-view="login" aria-labelledby="login-heading">
        <h1 id="login-heading" class="auth-title">Đăng nhập</h1>
        <p class="auth-subtitle">Xem phim không giới hạn, mọi lúc mọi nơi.</p>

        <p class="notice" id="login-notice" role="alert" aria-atomic="true" hidden></p>

        <form id="login-form" class="auth-form" novalidate>
          <fieldset class="form-fieldset">
            <legend class="visually-hidden">Thông tin đăng nhập</legend>

            <div class="form-group">
              <label class="form-label" for="login-phone">Số điện thoại</label>
              <div class="input-shell">
                <input
                  type="tel"
                  id="login-phone"
                  name="phone"
                  class="text-input"
                  placeholder="Nhập số điện thoại"
                  inputmode="numeric"
                  maxlength="10"
                  pattern="[0-9]{10}"
                  autocomplete="tel"
                  required
                  aria-invalid="false"
                  aria-describedby="login-phone-error"
                />
              </div>
              <p class="field-error" id="login-phone-error" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="login-password">Mật khẩu</label>
              <div class="input-shell input-shell--password">
                <input
                  type="password"
                  id="login-password"
                  name="password"
                  class="text-input text-input--password"
                  placeholder="Nhập mật khẩu"
                  autocomplete="current-password"
                  required
                  aria-invalid="false"
                  aria-describedby="login-password-error"
                />
                <button type="button" class="toggle-visibility" data-target="login-password" aria-label="Hiện mật khẩu">Hiện</button>
              </div>
              <p class="field-error" id="login-password-error" aria-live="polite"></p>
            </div>

            <div class="form-options">
              <label class="checkbox-row is-demo" for="remember-me" title="Tính năng minh họa">
                <input type="checkbox" id="remember-me" name="remember-me" disabled />
                <span>Nhớ mật khẩu</span>
              </label>
              <button type="button" class="forgot-link" title="Tính năng minh họa" disabled>Quên mật khẩu?</button>
            </div>
          </fieldset>

          <button class="btn btn-primary" id="login-continue-btn" type="submit">Đăng nhập</button>
        </form>

        <p class="divider"><span>Hoặc</span></p>

        <div class="social-row">
          <button class="btn google" type="button" title="Tính năng minh họa" disabled>
            <img src="/login_page/assets/gg_logo.svg" alt="" />
            Đăng nhập bằng Google
          </button>
          <button class="btn facebook" type="button" title="Tính năng minh họa" disabled>
            <img src="/login_page/assets/fb_logo.svg" alt="" />
            Đăng nhập bằng Facebook
          </button>
        </div>

        <p class="auth-footer">
          Bạn chưa có tài khoản?
          <a href="/login_page/register/register.html" class="link">Đăng ký</a>
        </p>
      </section>

        </div>
      </section>
    </article>
  </main>

  <script src="/login_page/login/login.js"></script>
</body>
</html>
