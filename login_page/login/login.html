<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineWave · Đăng nhập</title>
  <link rel="stylesheet" href="auth_common.css" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <header class="auth-header">
    <img class="auth-header__logo" src="assets/movie_logo.png" alt="CineWave" />
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <section id="view-login" class="auth-view is-active" data-view="login" aria-labelledby="login-heading">
        <h1 id="login-heading" class="auth-title">Đăng nhập</h1>
        <p class="auth-subtitle">Xem phim không giới hạn, mọi lúc mọi nơi.</p>

        <p class="notice" id="login-notice" role="alert" hidden></p>

        <form id="login-form" class="auth-form" novalidate>
          <fieldset class="form-fieldset">
            <legend class="visually-hidden">Thông tin đăng nhập</legend>

            <div class="form-group">
              <label class="form-label" for="login-phone">Số điện thoại</label>
              <div class="input-shell">
                <input
                  type="tel"
                  id="login-phone"
                  name="phone"
                  class="text-input"
                  placeholder="Nhập số điện thoại"
                  inputmode="numeric"
                  autocomplete="tel"
                  aria-describedby="login-phone-error"
                />
              </div>
              <p class="field-error" id="login-phone-error"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="login-password">Mật khẩu</label>
              <div class="input-shell input-shell--password">
                <input
                  type="password"
                  id="login-password"
                  name="password"
                  class="text-input text-input--password"
                  placeholder="Nhập mật khẩu"
                  autocomplete="current-password"
                  aria-describedby="login-password-error"
                />
                <button type="button" class="toggle-visibility" data-target="login-password" aria-label="Hiện mật khẩu">Hiện</button>
              </div>
              <p class="field-error" id="login-password-error"></p>
            </div>

            <div class="form-options">
              <label class="checkbox-row" for="remember-me">
                <input type="checkbox" id="remember-me" name="remember-me" />
                <span>Nhớ mật khẩu</span>
              </label>
              <a href="#" class="forgot-link">Quên mật khẩu?</a>
            </div>
          </fieldset>

          <button class="btn btn-primary" id="login-continue-btn" type="submit">Đăng nhập</button>
        </form>

        <p class="divider"><span>Hoặc</span></p>

        <div class="social-row">
          <button class="btn google" type="button">
            <img src="assets/gg_logo.svg" alt="" />
            Đăng nhập bằng Google
          </button>
          <button class="btn facebook" type="button">
            <img src="assets/fb_logo.svg" alt="" />
            Đăng nhập bằng Facebook
          </button>
        </div>

        <p class="auth-footer">
          Bạn chưa có tài khoản?
          <a href="register.html" class="link">Đăng ký</a>
        </p>
      </section>

    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
