<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flix | Login</title>
  <link rel="stylesheet" href="/login_page/common.css" />
  <link rel="stylesheet" href="/login_page/login/login.css" />
</head>
<body>
  <main class="auth-page">
    <article class="auth-layout">
      <section
        id="view-login"
        class="auth-main auth-view is-active"
        data-view="login"
        aria-labelledby="login-heading"
      >
        <header class="auth-header">
          <a class="auth-header__home" href="/index.html" aria-label="Go to the Flix home page">
            <img class="auth-header__logo" src="/login_page/assets/movie_logo.png" width="500" height="500" alt="Flix" />
          </a>
        </header>

        <div class="auth-card">
          <h1 id="login-heading" class="auth-title">Login</h1>
          <p class="auth-subtitle">Unlimited movies, anytime, anywhere</p>

          <p class="notice" id="login-notice" role="alert" aria-atomic="true" hidden></p>

          <form id="login-form" class="auth-form" novalidate>
            <fieldset class="form-fieldset">
              <legend class="visually-hidden">Login information</legend>

              <div class="form-group">
                <label class="form-label" for="login-phone">Phone number</label>
                <div class="input-shell">
                  <input
                    type="tel"
                    id="login-phone"
                    name="phone"
                    class="text-input"
                    placeholder="Enter your phone number"
                    inputmode="numeric"
                    maxlength="10"
                    pattern="[0-9]{10}"
                    autocomplete="tel"
                    required
                    aria-invalid="false"
                    aria-describedby="login-phone-error"
                  />
                </div>
                <p class="field-error" id="login-phone-error" aria-live="polite"></p>
              </div>

              <div class="form-group">
                <label class="form-label" for="login-password">Password</label>
                <div class="input-shell input-shell--password">
                  <input
                    type="password"
                    id="login-password"
                    name="password"
                    class="text-input text-input--password"
                    placeholder="Enter your password"
                    autocomplete="current-password"
                    required
                    aria-invalid="false"
                    aria-describedby="login-password-error"
                  />
                  <button type="button" class="toggle-visibility" data-target="login-password" aria-label="Show password">Show</button>
                </div>
                <p class="field-error" id="login-password-error" aria-live="polite"></p>
              </div>

              <div class="form-options">
                <label class="checkbox-row is-demo" for="remember-me" title="Demo feature">
                  <input type="checkbox" id="remember-me" name="remember-me" />
                  <span>Remember password</span>
                </label>
                <button type="button" class="forgot-link" title="Demo feature">Forgot password?</button>
              </div>
            </fieldset>

            <button class="btn btn-primary" id="login-continue-btn" type="submit">Login</button>
          </form>

          <p class="divider"><span>Or</span></p>

          <div class="social-row">
            <button class="btn google" type="button" title="Demo feature">
              <img src="/login_page/assets/gg_logo.svg" alt="" />
              Login with Google
            </button>
            <button class="btn facebook" type="button" title="Demo feature">
              <img src="/login_page/assets/fb_logo.svg" alt="" />
              Login with Facebook
            </button>
          </div>

          <footer class="auth-footer">
            <p>
              Don't have an account?
              <a href="/login_page/register/register.html" class="link">Sign up</a>
            </p>
          </footer>
        </div>
      </section>
    </article>
  </main>

  <script src="/login_page/login/login.js"></script>
</body>
</html>
